name: silver_fun
description: "Silvers Fun — a friendly companionship app for adults 65+."
publish_to: "none"
version: 1.0.8+9

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.3.0
  google_sign_in: ^6.2.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_cloud_firestore: ^3.0.3
  firebase_auth_mocks: ^0.14.1
  mockito: ^5.4.4
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  generate: true

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/branding/app_icon_source_1024.png"
  adaptive_icon_background: "#F2EEFF"
  adaptive_icon_foreground: "assets/branding/app_icon_foreground_adaptive_432.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#F2EEFF"
  image: "assets/branding/splash_icon_1152.png"
  android: true
  ios: false
  web: false
  android_12:
    color: "#F2EEFF"
    image: "assets/branding/splash_icon_1152.png"
